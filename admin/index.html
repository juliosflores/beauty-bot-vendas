<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Prospecção - BeautyBot POA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme">
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">Beauty<span>Bot</span></div>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li class="active"><a href="#"><i class="fas fa-users"></i> Prospecção</a></li>
                    <li><a href="#"><i class="fas fa-chart-line"></i> Vendas</a></li>
                    <li><a href="#"><i class="fas fa-cog"></i> Configurações</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <p>Região Metropolitana POA</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Buscar barbearia ou bairro...">
                </div>
                <div class="header-actions">
                    <select id="city-filter" class="city-select">
                        <option value="all">Todas as Cidades</option>
                        <option value="Porto Alegre">Porto Alegre</option>
                        <option value="Canoas">Canoas</option>
                        <option value="Gravataí">Gravataí</option>
                        <option value="Novo Hamburgo">Novo Hamburgo</option>
                        <option value="São Leopoldo">São Leopoldo</option>
                        <option value="Cachoeirinha">Cachoeirinha</option>
                        <option value="Viamão">Viamão</option>
                        <option value="Alvorada">Alvorada</option>
                    </select>
                    <input type="file" id="import-input" accept=".json" style="display: none;">
                    <button id="import-btn" class="btn-secondary-sm"><i class="fas fa-file-import"></i> Importar</button>
                    <button id="add-lead-btn" class="btn-primary"><i class="fas fa-plus"></i> Novo Lead</button>
                </div>
            </header>

            <section class="dashboard-stats">
                <div class="stat-card">
                    <div class="stat-icon blue"><i class="fas fa-store"></i></div>
                    <div class="stat-info">
                        <h3>Total de Leads</h3>
                        <p id="total-leads">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon gold"><i class="fas fa-clock"></i></div>
                    <div class="stat-info">
                        <h3>Contatados</h3>
                        <p id="contacted-leads">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-info">
                        <h3>Clientes Ativos</h3>
                        <p id="active-customers">0</p>
                    </div>
                </div>
            </section>

            <section class="leads-section">
                <div class="table-container">
                    <table id="leads-table">
                        <thead>
                            <tr>
                                <th>Barbearia / Salão</th>
                                <th>Cidade</th>
                                <th>Bairro</th>
                                <th>Status</th>
                                <th>WhatsApp</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="leads-body">
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal -->
    <div id="lead-modal" class="modal">
        <div class="modal-content glass">
            <span class="close-modal">&times;</span>
            <h2>Cadastrar Nova Barbearia</h2>
            <form id="lead-form">
                <div class="form-group">
                    <label>Nome do Estabelecimento</label>
                    <input type="text" id="name" required placeholder="Ex: Barbearia do Centro">
                </div>
                <div class="form-group">
                    <label>Cidade</label>
                    <input type="text" id="city" required placeholder="Ex: Porto Alegre" value="Porto Alegre">
                </div>
                <div class="form-group">
                    <label>Bairro</label>
                    <input type="text" id="neighborhood" required placeholder="Ex: Cidade Baixa">
                </div>
                <div class="form-group">
                    <label>WhatsApp</label>
                    <input type="tel" id="whatsapp" required placeholder="(51) 99999-9999">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option value="lead">Lead (Novo)</option>
                        <option value="contacted">Contatado</option>
                        <option value="customer">Cliente Ativo</option>
                        <option value="rejected">Recusou</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary-large">Salvar Lead</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
